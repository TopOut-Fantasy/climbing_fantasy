info:
  name: List events
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/events?season_id={{seasonId}}&discipline={{discipline}}&status={{eventStatus}}&year={{year}}&page=1&per_page=25"
  params:
    - name: season_id
      value: "{{seasonId}}"
      type: query
    - name: discipline
      value: "{{discipline}}"
      type: query
    - name: status
      value: "{{eventStatus}}"
      type: query
    - name: year
      value: "{{year}}"
      type: query
    - name: page
      value: "1"
      type: query
    - name: per_page
      value: "25"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

