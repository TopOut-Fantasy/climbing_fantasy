info:
  name: List athletes
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/athletes?q={{athleteQuery}}&country={{countryCode}}&page=1&per_page=25"
  params:
    - name: q
      value: "{{athleteQuery}}"
      type: query
    - name: country
      value: "{{countryCode}}"
      type: query
    - name: page
      value: "1"
      type: query
    - name: per_page
      value: "25"
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

