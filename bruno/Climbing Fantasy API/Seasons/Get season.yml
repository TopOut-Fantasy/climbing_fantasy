info:
  name: Get season
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/v1/seasons/{{seasonId}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
