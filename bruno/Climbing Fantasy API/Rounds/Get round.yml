info:
  name: Get round
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/api/v1/rounds/{{roundId}}"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

