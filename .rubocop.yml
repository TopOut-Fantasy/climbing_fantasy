inherit_gem:
  rubocop-shopify: rubocop.yml

plugins:
  - rubocop-rails

AllCops:
  NewCops: enable
  TargetRubyVersion: 4.0
  Exclude:
    - "db/schema.rb"
    - "db/migrate/**/*"
    - "bin/**/*"
    - "node_modules/**/*"
    - "vendor/**/*"

# Ruby 4.0 freezes string literals by default — the magic comment is redundant noise
Style/FrozenStringLiteralComment:
  EnforcedStyle: never
